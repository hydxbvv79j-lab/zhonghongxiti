<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中宏选择题练习</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Macroeconomics Quiz</p>
      <h1>中宏选择题练习</h1>
    </div>
    <div class="score" id="score">共 670 题</div>
  </header>

  <main>
    <section class="controls" aria-label="筛选章节">
      <button class="chip active" data-chapter="all">全部章节</button>
      <button class="chip" data-chapter="Chapter 1">Chapter 1</button>
<button class="chip" data-chapter="Chapter 2">Chapter 2</button>
<button class="chip" data-chapter="Chapter 3">Chapter 3</button>
<button class="chip" data-chapter="Chapter 4">Chapter 4</button>
<button class="chip" data-chapter="Chapter 5">Chapter 5</button>
<button class="chip" data-chapter="Chapter 6">Chapter 6</button>
<button class="chip" data-chapter="Chapter 7">Chapter 7</button>
<button class="chip" data-chapter="Chapter 8">Chapter 8</button>
    </section>
    <section class="quiz-list" id="quizList"></section>
  </main>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
